# ~/.tmux.conf

# Windows and panes index from 1
set -g base-index 1
setw -g pane-base-index 1

# Large scrollback (1 MiB lines)
set -g history-limit 1048576

# No mouse
set -g mouse off

# Status bar — Catppuccin Mocha
set -g status-style          "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position       bottom
set -g status-interval       5
set -g status-left-length    30
set -g status-right-length   40

# Left: session name in Mauve block
# #S = tmux session name. Sessions are numbered automatically (0, 1, 2 ...).
# Rename with: tmux rename-session <name>  or  Ctrl+b  $
set -g status-left  "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7,nobold]  "

# Right: hostname only — no clock (prompt already shows time)
set -g status-right "#[fg=#89b4fa] #H "

# Inactive window tab
setw -g window-status-style          "bg=#1e1e2e,fg=#6c7086"
setw -g window-status-format         " #I:#W "

# Active window tab
setw -g window-status-current-style  "bg=#313244,fg=#89b4fa,bold"
setw -g window-status-current-format " #I:#W "

# No gap between window tabs
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Command/message bar
set -g message-style         "bg=#313244,fg=#f9e2af,bold"
set -g message-command-style "bg=#313244,fg=#89b4fa"

# Copy mode highlight
setw -g mode-style "bg=#45475a,fg=#cdd6f4"

# Window navigation — no prefix
# Shift+Left/Right switches windows
bind-key -n S-Left  previous-window
bind-key -n S-Right next-window

# Pane navigation — Option+WASD, no prefix
# macOS Terminal.app sends Unicode chars for Option+key (same trick as layouts):
#   Option+W → ∑  (up)
#   Option+A → å  (left)
#   Option+S → ß  (down)
#   Option+D → ∂  (right)
bind-key -n '∑' select-pane -U
bind-key -n 'å' select-pane -L
bind-key -n 'ß' select-pane -D
bind-key -n '∂' select-pane -R

# Pane navigation — Ctrl+b prefix fallback (vim style + arrows)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key Left  select-pane -L
bind-key Right select-pane -R
bind-key Up    select-pane -U
bind-key Down  select-pane -D

# Synchronize all panes in window
bind-key @ setw synchronize-panes

# Scrollback — fn+Up/Down (Page Up/Down) on macOS Terminal.app
bind-key -n PPage copy-mode -u
bind-key    PPage copy-mode -u
bind-key -T copy-mode PPage  send -X page-up
bind-key -T copy-mode NPage  send -X page-down
bind-key -T copy-mode Escape send -X cancel
bind-key -T copy-mode q      send -X cancel

# Layout shortcuts — Option+1–7 on macOS Terminal.app
# Terminal.app sends these Unicode chars for Option+1–7: ¡ ™ £ ¢ ∞ § ¶
bind-key -n '¡' select-layout even-horizontal
bind-key -n '™' select-layout even-vertical
bind-key -n '£' select-layout main-horizontal
bind-key -n '¢' select-layout main-vertical
bind-key -n '∞' select-layout tiled
bind-key -n '§' next-layout
bind-key -n '¶' previous-layout
